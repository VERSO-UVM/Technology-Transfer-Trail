<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none">
  <rect width="320" height="220" rx="12" fill="#d1fae5"/>

  <!-- Network nodes -->
  <circle cx="160" cy="90" r="20" fill="#10b981" opacity="0.9"/>
  <circle cx="80" cy="60" r="13" fill="#10b981" opacity="0.6"/>
  <circle cx="240" cy="60" r="13" fill="#10b981" opacity="0.6"/>
  <circle cx="60" cy="140" r="10" fill="#10b981" opacity="0.5"/>
  <circle cx="260" cy="140" r="10" fill="#10b981" opacity="0.5"/>
  <circle cx="120" cy="160" r="10" fill="#10b981" opacity="0.5"/>
  <circle cx="200" cy="160" r="10" fill="#10b981" opacity="0.5"/>

  <!-- Network lines -->
  <line x1="160" y1="90" x2="80" y2="60" stroke="#065f46" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="90" x2="240" y2="60" stroke="#065f46" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="60" x2="60" y2="140" stroke="#065f46" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="60" x2="260" y2="140" stroke="#065f46" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="90" x2="120" y2="160" stroke="#065f46" stroke-width="1.5" opacity="0.4"/>
  <line x1="160" y1="90" x2="200" y2="160" stroke="#065f46" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="60" x2="120" y2="160" stroke="#065f46" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="60" x2="200" y2="160" stroke="#065f46" stroke-width="1" opacity="0.3"/>

  <!-- Center icon: open lock / code brackets -->
  <text x="160" y="96" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="monospace">&lt;/&gt;</text>

  <!-- Node icons -->
  <text x="80" y="65" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">&#128187;</text>
  <text x="240" y="65" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif">&#127758;</text>

  <!-- Label -->
  <text x="160" y="195" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700" font-family="sans-serif">OPEN SOURCE</text>
</svg>
