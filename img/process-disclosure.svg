<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5ee"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="12" fill="url(#bg)"/>

  <!-- Step 1: Lightbulb -->
  <circle cx="65" cy="100" r="30" fill="white" stroke="#2d7a4f" stroke-width="2"/>
  <text x="65" y="108" text-anchor="middle" font-size="22">&#128161;</text>
  <text x="65" y="150" text-anchor="middle" fill="#1a4a2e" font-size="11" font-weight="600" font-family="sans-serif">Discovery</text>

  <!-- Arrow -->
  <path d="M100,100 L130,100" stroke="#2d7a4f" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="130,95 140,100 130,105" fill="#2d7a4f"/>

  <!-- Step 2: Form/document -->
  <circle cx="175" cy="100" r="30" fill="white" stroke="#2d7a4f" stroke-width="2"/>
  <text x="175" y="108" text-anchor="middle" font-size="22">&#128196;</text>
  <text x="175" y="150" text-anchor="middle" fill="#1a4a2e" font-size="11" font-weight="600" font-family="sans-serif">Disclosure</text>

  <!-- Arrow -->
  <path d="M210,100 L240,100" stroke="#2d7a4f" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="240,95 250,100 240,105" fill="#2d7a4f"/>

  <!-- Step 3: Shield/patent -->
  <circle cx="285" cy="100" r="30" fill="white" stroke="#2d7a4f" stroke-width="2"/>
  <text x="285" y="108" text-anchor="middle" font-size="22">&#128737;</text>
  <text x="285" y="150" text-anchor="middle" fill="#1a4a2e" font-size="11" font-weight="600" font-family="sans-serif">Protection</text>

  <!-- Arrow -->
  <path d="M320,100 L350,100" stroke="#2d7a4f" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="350,95 360,100 350,105" fill="#2d7a4f"/>

  <!-- Step 4: Globe/impact -->
  <circle cx="375" cy="100" r="20" fill="#2d7a4f"/>
  <text x="375" y="107" text-anchor="middle" font-size="16">&#127758;</text>
  <text x="375" y="145" text-anchor="middle" fill="#1a4a2e" font-size="11" font-weight="600" font-family="sans-serif">Impact</text>

  <!-- Timeline bar -->
  <rect x="40" y="175" width="320" height="6" rx="3" fill="#c8a84b" opacity="0.3"/>
  <rect x="40" y="175" width="180" height="6" rx="3" fill="#c8a84b"/>

  <text x="40" y="200" fill="#4a5e52" font-size="10" font-family="sans-serif">File early</text>
  <text x="200" y="200" text-anchor="middle" fill="#4a5e52" font-size="10" font-family="sans-serif">Typical journey: 12 months — several years</text>
  <text x="360" y="200" text-anchor="end" fill="#4a5e52" font-size="10" font-family="sans-serif">Market</text>
</svg>
