  <path d="M140,145 Q150,130 145,115" stroke="#c8a84b" stroke-width="1.5" fill="none" opacity="0.7"/>
  <line x1="60" y1="145" x2="140" y2="145" stroke="#c8a84b" stroke-width="1" opacity="0.4"/>
</svg>
