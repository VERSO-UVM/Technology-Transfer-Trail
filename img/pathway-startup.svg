<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none">
  <rect width="320" height="220" rx="12" fill="#fef3c7"/>

  <!-- Rocket body -->
  <path d="M160,30 C160,30 130,70 125,120 L160,130 L195,120 C190,70 160,30 160,30 Z"
        fill="#f59e0b" stroke="#92400e" stroke-width="1.5"/>

  <!-- Rocket window -->
  <circle cx="160" cy="90" r="12" fill="white" stroke="#92400e" stroke-width="1.5"/>
  <circle cx="160" cy="90" r="7" fill="#fcd34d"/>

  <!-- Rocket fins -->
  <path d="M125,120 L105,145 L135,135 Z" fill="#d97706"/>
  <path d="M195,120 L215,145 L185,135 Z" fill="#d97706"/>

  <!-- Exhaust flame -->
  <ellipse cx="160" cy="140" rx="12" ry="18" fill="#f97316" opacity="0.8"/>
  <ellipse cx="160" cy="148" rx="7" ry="12" fill="#fbbf24"/>
  <ellipse cx="160" cy="154" rx="4" ry="7" fill="white" opacity="0.6"/>

  <!-- Stars -->
  <circle cx="80" cy="55" r="2" fill="#f59e0b"/>
  <circle cx="100" cy="35" r="1.5" fill="#f59e0b"/>
  <circle cx="230" cy="45" r="2" fill="#f59e0b"/>
  <circle cx="245" cy="70" r="1.5" fill="#f59e0b"/>
  <circle cx="70" cy="90" r="1.5" fill="#f59e0b"/>

  <!-- Growth chart (bottom) -->
  <polyline points="85,180 110,170 135,162 160,152 185,158 210,145 235,135"
            stroke="#92400e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>

  <!-- Label -->
  <text x="160" y="200" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700" font-family="sans-serif">STARTUP</text>
</svg>
